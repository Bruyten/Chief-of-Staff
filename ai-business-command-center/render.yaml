databases:
  - name: chief-of-staff-db
    databaseName: chief
    user: chief

services:
  - type: web
    name: chief-of-staff-api
    runtime: node
    rootDir: ai-business-command-center/server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chief-of-staff-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FAKE_AI
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FAKE_STRIPE
        value: "true"
      - key: CLIENT_ORIGIN
        value: https://chief-of-staff-web.onrender.com
      - key: BILLING_SUCCESS_URL
        value: https://chief-of-staff-web.onrender.com/billing/success
      - key: BILLING_CANCEL_URL
        value: https://chief-of-staff-web.onrender.com/pricing
      - key: NODE_ENV
        value: production

  - type: static_site
    name: chief-of-staff-web
    rootDir: ai-business-command-center/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://chief-of-staff-api.onrender.com
